name: Deploy Stocks Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Validate Lambda functions
        run: |
          python -m py_compile lambdas/ingestion/handler.py
          python -m py_compile lambdas/api/handler.py
          python -m py_compile scripts/backfill.py
          echo "All Lambda files validated successfully"

      - name: Terraform Init
        working-directory: infra
        run: terraform init

      - name: Terraform Validate
        working-directory: infra
        run: terraform validate

      - name: Terraform Apply
        working-directory: infra
        run: terraform apply -auto-approve

      - name: Deploy frontend to S3
        run: |
          BUCKET=$(aws s3 ls | grep stocks-pipeline-frontend | awk '{print $3}')
          aws s3 cp frontend/index.html s3://$BUCKET/index.html --region us-east-1
          echo "Frontend deployed to S3 bucket $BUCKET"